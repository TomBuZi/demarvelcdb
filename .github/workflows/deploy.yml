name: Deploy to Discloud

on:
  push:
    branches: [main]
    paths:
      - 'rulebook_entries.json'
      - 'translations_local/**'
      - '**.py'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip project
        run: zip -r deploy.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x ".env" -x "Error.txt"

      - name: Upload to Discloud
        run: |
          curl -X PUT "https://api.discloud.app/v2/app/${{ secrets.DISCLOUD_BOT_ID }}/upload" \
            -H "api-token: ${{ secrets.DISCLOUD_TOKEN }}" \
            -F "file=@deploy.zip"
